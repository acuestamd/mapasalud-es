name: Refresh data

# Sources update roughly annually; a monthly cron keeps the snapshot honest and
# surfaces upstream changes as visible diffs. Commits only when data changed.
on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: pip install -r requirements.txt
      - name: Fetch + normalize + assign CCAA + indicators + esperas
        run: |
          python3 scripts/fetch_osm_hospitals.py
          python3 scripts/normalize_osm_hospitals.py
          node scripts/assign_ccaa.mjs
          python3 scripts/fetch_inclasns.py
          python3 scripts/fetch_sisle.py
      - name: Validate data schema
        run: python -m pytest -q
      - name: Regenerate sharecards (Plex via headless Chrome)
        run: |
          export CHROME_PATH="$(which google-chrome || which google-chrome-stable || echo /usr/bin/google-chrome)"
          node scripts/gen_sharecards.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data-raw src/data src/sharecards)" ]; then
            git config user.name "Armando Cuesta"
            git config user.email "acuesta@me.com"
            git add data-raw src/data src/sharecards
            git commit -m "data: refresh hospital snapshot ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes."
          fi
      - name: Aviso si falla el refresco
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Fallo en el refresco de datos ($(date -u +%Y-%m-%d))" \
            --body "El workflow 'Refresh data' ha fallado (posible cambio/caída de OSM, INCLASNS o SISLE). Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
